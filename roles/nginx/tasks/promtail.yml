---
- name: Create promtail system user
  ansible.builtin.user:
    name: promtail
    system: true
    shell: /sbin/nologin
    groups: adm
    append: true
    state: present

- name: Check if promtail is installed
  ansible.builtin.command: /usr/local/bin/promtail -version
  register: nginx_promtail_check
  ignore_errors: true
  changed_when: false

- name: Download promtail archive locally
  ansible.builtin.get_url:
    url: "https://github.com/grafana/loki/releases/download/v{{ nginx_promtail_version }}/promtail-linux-amd64.zip"
    dest: "/tmp/promtail-linux-amd64-{{ nginx_promtail_version }}.zip"
    mode: '0644'
  delegate_to: localhost
  run_once: true
  become: false
  when: nginx_promtail_check.rc != 0

- name: Extract promtail archive locally
  ansible.builtin.unarchive:
    src: "/tmp/promtail-linux-amd64-{{ nginx_promtail_version }}.zip"
    dest: "/tmp/"
    remote_src: true
  delegate_to: localhost
  run_once: true
  become: false
  when: nginx_promtail_check.rc != 0

- name: Copy promtail binary to target node
  ansible.builtin.copy:
    src: "/tmp/promtail-linux-amd64"
    dest: "/usr/local/bin/promtail"
    mode: '0755'
    owner: root
    group: root
  when: nginx_promtail_check.rc != 0

- name: Ensure promtail config directory exists
  ansible.builtin.file:
    path: /etc/promtail
    state: directory
    mode: '0755'

- name: Configure promtail
  ansible.builtin.template:
    src: promtail.yml.j2
    dest: /etc/promtail/config.yml
    mode: '0644'
  notify: Restart promtail

- name: Configure promtail systemd service
  ansible.builtin.template:
    src: promtail.service.j2
    dest: /etc/systemd/system/promtail.service
    mode: '0644'
  notify: Restart promtail

- name: Enable and start promtail
  ansible.builtin.systemd:
    name: promtail
    state: "{{ 'started' if nginx_promtail_enabled | default(false) else 'stopped' }}"
    enabled: "{{ nginx_promtail_enabled | default(false) }}"
    daemon_reload: true
