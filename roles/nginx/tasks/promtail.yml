---
- name: Create promtail system user
  ansible.builtin.user:
    name: promtail
    system: true
    shell: /sbin/nologin
    groups: adm
    append: true
    state: present

- name: Check if promtail is installed
  ansible.builtin.command: which promtail
  register: nginx_promtail_check
  ignore_errors: true
  changed_when: false

- name: Set promtail binary path
  ansible.builtin.set_fact:
    nginx_promtail_bin_path: "{{ nginx_promtail_check.stdout | default('/usr/local/bin/promtail', true) }}"

- name: Download and extract promtail archive
  when: nginx_promtail_check.rc != 0
  block:
    - name: Download and extract promtail archive
      ansible.builtin.unarchive:
        src: "https://github.com/grafana/loki/releases/download/v{{ nginx_promtail_version }}/promtail-linux-amd64.zip"
        dest: "/tmp/"
        remote_src: true
      delegate_to: "{{ 'localhost' if nginx_download_locally | default(false) else inventory_hostname }}"
      run_once: "{{ nginx_download_locally | default(false) }}"
      become: "{{ not (nginx_download_locally | default(false)) }}"

    - name: Copy promtail binary to target node
      ansible.builtin.copy:
        src: "/tmp/promtail-linux-amd64"
        dest: "/usr/local/bin/promtail"
        mode: '0755'
        owner: root
        group: root
        remote_src: "{{ not (nginx_download_locally | default(false)) }}"

- name: Ensure promtail config directory exists
  ansible.builtin.file:
    path: /etc/promtail
    state: directory
    mode: '0755'

- name: Configure promtail
  ansible.builtin.template:
    src: promtail.yml.j2
    dest: /etc/promtail/config.yml
    mode: '0644'
  notify: Restart promtail

- name: Configure promtail systemd service
  ansible.builtin.template:
    src: promtail.service.j2
    dest: /etc/systemd/system/promtail.service
    mode: '0644'
  notify: Restart promtail

- name: Enable and start promtail
  ansible.builtin.systemd:
    name: promtail
    state: "{{ 'started' if nginx_promtail_enabled | default(false) else 'stopped' }}"
    enabled: "{{ nginx_promtail_enabled | default(false) }}"
    daemon_reload: true
