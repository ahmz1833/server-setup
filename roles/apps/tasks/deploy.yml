---
- name: Sort apps by dependencies
  ansible.builtin.set_fact:
    _apps_sorted: >-
      {%- set result = [] -%}
      {%- set resolved = [] -%}
      {%- set max_iterations = apps_list | length + 1 -%}
      {%- for _ in range(max_iterations) -%}
        {%- for app in apps_list -%}
          {%- if app.name not in resolved -%}
            {%- set deps = app.depends_on | default([]) -%}
            {%- set deps_met = deps | reject('in', resolved) | list | length == 0 -%}
            {%- if deps_met -%}
              {%- set _ = result.append(app) -%}
              {%- set _ = resolved.append(app.name) -%}
            {%- endif -%}
          {%- endif -%}
        {%- endfor -%}
      {%- endfor -%}
      {{ result }}

- name: Verify all apps were sorted (no circular dependencies)
  ansible.builtin.assert:
    that:
      - _apps_sorted | length == apps_list | length
    fail_msg: >-
      Circular dependency detected! Resolved {{ _apps_sorted | length }} of
      {{ apps_list | length }} apps. Check depends_on configuration.
    quiet: true

- name: Fetch existing container configurations
  community.docker.docker_container_info:
    name: "{{ item.name }}"
  register: _apps_existing_raw
  loop: "{{ _apps_sorted }}"
  loop_control:
    label: "{{ item.name }}"

- name: Build existing config lookup
  ansible.builtin.set_fact:
    _apps_existing_config: >-
      {%- set config = {} -%}
      {%- for result in _apps_existing_raw.results | default([]) -%}
        {%- if result.exists | default(false) and result.container is defined -%}
          {%- set c = result.container -%}
          {%- set hc = c.get('HostConfig') or {} -%}
          {%- set cfg = c.get('Config') or {} -%}
          {%- set ns = c.get('NetworkSettings') or {} -%}
          {#- Parse environment -#}
          {%- set env_dict = {} -%}
          {%- for e in cfg.get('Env') or [] -%}
            {%- set kv = e.split('=', 1) -%}
            {%- if kv | length == 2 -%}
              {%- set _ = env_dict.update({kv[0]: kv[1]}) -%}
            {%- endif -%}
          {%- endfor -%}
          {#- Parse networks -#}
          {%- set net_list = [] -%}
          {%- for net_name in ns.get('Networks') or {} -%}
            {%- set _ = net_list.append({'name': net_name}) -%}
          {%- endfor -%}
          {#- Parse ports -#}
          {%- set port_list = [] -%}
          {%- for port, bindings in (hc.get('PortBindings') or {}) | items -%}
            {%- for b in bindings | default([]) -%}
              {%- set hip = b.get('HostIp', '') -%}
              {%- set hport = b.get('HostPort', '') -%}
              {%- if hip and hip != '0.0.0.0' and hip != '::' -%}
                {%- set _ = port_list.append(hip ~ ':' ~ hport ~ ':' ~ port) -%}
              {%- else -%}
                {%- set _ = port_list.append(hport ~ ':' ~ port) -%}
              {%- endif -%}
            {%- endfor -%}
          {%- endfor -%}
          {#- Parse capabilities -#}
          {%- set caps = {} -%}
          {%- if hc.get('CapAdd') -%}
            {%- set _ = caps.update({'add': hc.get('CapAdd')}) -%}
          {%- endif -%}
          {%- if hc.get('CapDrop') -%}
            {%- set _ = caps.update({'drop': hc.get('CapDrop')}) -%}
          {%- endif -%}
          {#- Build entry -#}
          {%- set tmpfs_list = [] -%}
          {%- for tmpfs_path, tmpfs_opts in (hc.get('Tmpfs') or {}) | items -%}
            {%- if tmpfs_opts -%}
              {%- set _ = tmpfs_list.append(tmpfs_path ~ ':' ~ tmpfs_opts) -%}
            {%- else -%}
              {%- set _ = tmpfs_list.append(tmpfs_path) -%}
            {%- endif -%}
          {%- endfor -%}
          {%- set entry = {
            'exists': true,
            'command': cfg.get('Cmd'),
            'entrypoint': cfg.get('Entrypoint'),
            'user': cfg.get('User') if cfg.get('User') else none,
            'working_dir': cfg.get('WorkingDir') if cfg.get('WorkingDir') else none,
            'hostname': cfg.get('Hostname'),
            'ports': port_list,
            'networks': net_list,
            'dns': hc.get('Dns', []),
            'volumes': hc.get('Binds', []),
            'tmpfs': tmpfs_list,
            'env': env_dict,
            'labels': cfg.get('Labels', {}),
            'memory': hc.get('Memory', 0),
            'memory_swap': hc.get('MemorySwap', 0),
            'memory_reservation': hc.get('MemoryReservation', 0),
            'cpus': (hc.get('NanoCpus', 0) or 0) / 1000000000.0,
            'healthcheck': none,
            'privileged': hc.get('Privileged', false),
            'read_only': hc.get('ReadonlyRootfs', false),
            'capabilities': caps if caps else none,
            'security_opts': hc.get('SecurityOpt', []),
            'log_driver': (hc.get('LogConfig') or {}).get('Type'),
            'log_options': (hc.get('LogConfig') or {}).get('Config', {}),
            'restart_policy': (hc.get('RestartPolicy') or {}).get('Name')
          } -%}
          {%- set _ = config.update({result.item.name: entry}) -%}
        {%- else -%}
          {%- set _ = config.update({result.item.name: {'exists': false}}) -%}
        {%- endif -%}
      {%- endfor -%}
      {{ config }}

- name: Deploy containers in dependency order
  ansible.builtin.include_tasks: container.yml
  loop: "{{ _apps_sorted }}"
  loop_control:
    loop_var: _apps_app
    label: "{{ _apps_app.name }}"
