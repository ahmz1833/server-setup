---
collections:
  - community.docker

galaxy_info:
  role_name: apps
  author: ahmz
  description: >-
    Declarative Docker container lifecycle for Debian/Ubuntu hosts using
    community.docker: dependency-ordered deploys, optional health gating,
    preserve-mode merges for CI/CD, automatic networks and host bind paths,
    registry login, and optional pruning of unmanaged containers/networks.
  license: MIT
  min_ansible_version: "2.14"
  platforms:
    - name: Ubuntu
      versions:
        - focal
        - jammy
        - noble
    - name: Debian
      versions:
        - bullseye
        - bookworm
        - trixie
  galaxy_tags:
    - docker
    - containers
    - deployment
    - apps
    - devops

dependencies: []
