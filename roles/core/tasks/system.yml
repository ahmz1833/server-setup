---
- name: Set system timezone
  community.general.timezone:
    name: "{{ core_timezone }}"

- name: Set system hostname
  ansible.builtin.hostname:
    name: "{{ core_hostname }}"

- name: Check /etc/resolv.conf state
  ansible.builtin.stat:
    path: /etc/resolv.conf
  register: core_resolv_conf_stat
  when: core_manage_nameservers

- name: Remove /etc/resolv.conf symlink before managing file
  ansible.builtin.file:
    path: /etc/resolv.conf
    state: absent
  when:
    - core_manage_nameservers
    - core_resolv_conf_stat.stat.islnk | default(false)

- name: Manage /etc/resolv.conf
  ansible.builtin.copy:
    dest: /etc/resolv.conf
    owner: root
    group: root
    mode: '0644'
    content: |
      # Managed by Ansible - DO NOT EDIT
      {% for server in core_nameservers %}
      nameserver {{ server }}
      {% endfor %}
  when: core_manage_nameservers

- name: Manage /etc/hosts role section
  ansible.builtin.blockinfile:
    path: /etc/hosts
    marker: "# {mark} ANSIBLE MANAGED CORE HOSTS"
    block: |
      127.0.0.1 {{ core_hostname }}
      ::1 {{ core_hostname }}
      {% for host_entry in core_hosts_list %}
      {{ host_entry }}
      {% endfor %}
    create: true
    owner: root
    group: root
    mode: '0644'
