---
- name: Ensure ipset package is installed
  ansible.builtin.package:
    name: ipset
    state: present

- name: Create ipset data directory
  ansible.builtin.file:
    path: "{{ core_ipset_data_dir }}"
    state: directory
    mode: '0755'
    owner: root
    group: root

# Create IPSets
- name: Create ipsets
  ansible.builtin.command:
    cmd: >-
      ipset create {{ item.name }} {{ item.type | default('hash:net') }}
      family {{ item.family | default('inet') }} -exist
  loop: "{{ core_ipsets }}"
  loop_control:
    label: "{{ item.name }}"
  changed_when: false

# Populate static entries
- name: Flush and populate static ipsets
  ansible.builtin.shell: |
    set -euo pipefail
    ipset flush {{ item.name }}
    {% for entry in item.entries %}
    ipset add {{ item.name }} {{ entry }} -exist
    {% endfor %}
    ipset save {{ item.name }} > {{ core_ipset_data_dir }}/{{ item.name }}.save
  args:
    executable: /bin/bash
  loop: "{{ core_ipsets | selectattr('entries', 'defined') | list }}"
  loop_control:
    label: "{{ item.name }}"
  when: item.url is not defined
  changed_when: false

# Deploy update script for URL-based ipsets
- name: Deploy ipset update script
  ansible.builtin.template:
    src: ipset-update.sh.j2
    dest: "{{ core_ipset_data_dir }}/update-{{ item.name }}.sh"
    mode: '0755'
    owner: root
    group: root
  loop: "{{ core_ipsets | selectattr('url', 'defined') | list }}"
  loop_control:
    label: "{{ item.name }}"

# Initial update for URL-based ipsets
- name: Run ipset update for URL-based ipsets
  ansible.builtin.command: "{{ core_ipset_data_dir }}/update-{{ item.name }}.sh"
  loop: "{{ core_ipsets | selectattr('url', 'defined') | list }}"
  loop_control:
    label: "{{ item.name }}"
  changed_when: false

# Systemd Persistence (replaces cron @reboot)
- name: Deploy ipset-restore systemd service
  ansible.builtin.template:
    src: ipset-restore.service.j2
    dest: /etc/systemd/system/ipset-restore.service
    owner: root
    group: root
    mode: '0644'
  notify:
    - Reload systemd
    - Restart ipset-restore

- name: Enable ipset-restore service
  ansible.builtin.systemd:
    name: ipset-restore
    enabled: true
    daemon_reload: true

# NOTE: Cron jobs for periodic ipset updates are handled in cron.yml
