---
# Safety check: Verify SSH keys exist before disabling password auth
- name: Verify authorized keys for configured user
  ansible.builtin.shell: |
    set -o pipefail
    target_user="{{ core_ssh_ensure_pub_key_user }}"
    if ! getent passwd "$target_user" >/dev/null; then exit 3; fi
    user_home=$(getent passwd "$target_user" | cut -d: -f6)
    if [ ! -f "$user_home/.ssh/authorized_keys" ]; then exit 2; fi
    grep -qE '^(ssh-|ecdsa-|sk-)' "$user_home/.ssh/authorized_keys"
  args:
    executable: /bin/bash
  register: core_pubkey_check
  ignore_errors: true
  changed_when: false
  become: true
  when:
    - not core_ssh_password_auth
    - core_ssh_ensure_pub_key_user | length > 0

- name: Abort on public key verification failure
  ansible.builtin.fail:
    msg: "No valid SSH keys for user {{ core_ssh_ensure_pub_key_user }}. Cannot disable password auth safely."
  when:
    - not core_ssh_password_auth
    - core_ssh_ensure_pub_key_user | length > 0
    - core_pubkey_check.rc != 0

- name: Verify a non-root user exists
  ansible.builtin.shell: |
    set -o pipefail
    getent passwd | awk -F: '$3 >= 1000 && $7 !~ /nologin|false/ {print $1}' | grep -cv '^nobody$'
  args:
    executable: /bin/bash
  register: core_user_count_check
  changed_when: false
  when: not core_ssh_permit_root_login

- name: Abort on missing non-root user
  ansible.builtin.fail:
    msg: "No non-root users found. Cannot disable root login safely."
  when:
    - not core_ssh_permit_root_login
    - core_user_count_check.stdout | default('0') | int == 0

- name: Verify AllowUsers includes accessible user
  ansible.builtin.fail:
    msg: "AllowUsers ({{ core_ssh_allow_users | join(', ') }}) does not include {{ core_ssh_ensure_pub_key_user }}. This would cause lockout!"
  when:
    - core_ssh_allow_users | length > 0
    - core_ssh_ensure_pub_key_user | length > 0
    - core_ssh_ensure_pub_key_user not in core_ssh_allow_users

# Backup SSH Configuration
- name: Check if sshd_config exists
  ansible.builtin.stat:
    path: /etc/ssh/sshd_config
  register: core_sshd_config_stat

- name: Backup sshd_config before modification
  ansible.builtin.copy:
    src: /etc/ssh/sshd_config
    dest: "/etc/ssh/sshd_config.bak.{{ ansible_facts['date_time']['epoch'] }}"
    remote_src: true
    force: false
    owner: root
    group: root
    mode: '0600'
  when: core_sshd_config_stat.stat.exists

# -----------------------------------------------------------------------------
# SSH Configuration
# -----------------------------------------------------------------------------
- name: Find extra SSH configuration files
  ansible.builtin.find:
    paths: /etc/ssh/sshd_config.d
    patterns: "*.conf"
  register: core_ssh_extra_configs

- name: Backup extra SSH configuration files
  ansible.builtin.copy:
    src: "{{ item.path }}"
    dest: "/etc/ssh/sshd_config.d_{{ item.path | basename }}.bak.{{ ansible_facts['date_time']['epoch'] }}"
    remote_src: true
    force: false
    owner: root
    group: root
    mode: '0600'
  loop: "{{ core_ssh_extra_configs.files }}"

- name: Remove extra SSH configuration files
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ core_ssh_extra_configs.files }}"
  notify: Restart sshd

- name: Disable SSH config overrides
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^\s*Include\s+/etc/ssh/sshd_config\.d/'
    line: '# Include /etc/ssh/sshd_config.d/*.conf'
  notify: Restart sshd

- name: Comment out unmanaged SSH directives outside Ansible blocks
  ansible.builtin.command: |
    {{ ansible_python_interpreter | default('python3') }} -c '
    import sys, re
    try:
        with open("/etc/ssh/sshd_config", "r") as f:
            lines = f.readlines()
        out = []
        in_block = False
        changed = False
        pattern = re.compile(r"^\s*(Port|PasswordAuthentication|PermitRootLogin|X11Forwarding|AllowTcpForwarding|MaxAuthTries|LoginGraceTime|AllowUsers)[\s=]+",
                              re.IGNORECASE)
        for line in lines:
            if line.startswith("# BEGIN ANSIBLE MANAGED"):
                in_block = True
            elif line.startswith("# END ANSIBLE MANAGED"):
                in_block = False
                out.append(line)
                continue
            if not in_block and pattern.match(line):
                out.append("# " + line)
                changed = True
            else:
                out.append(line)
        if changed:
            with open("/etc/ssh/sshd_config", "w") as f:
                f.writelines(out)
            sys.exit(2)
        else:
            sys.exit(0)
    except Exception as e:
        print(e, file=sys.stderr)
        sys.exit(1)
    '
  register: core_ssh_comment_task
  changed_when: core_ssh_comment_task.rc == 2
  failed_when: core_ssh_comment_task.rc not in [0, 2]
  notify: Restart sshd

- name: Disable SSH socket activation to allow custom ports
  ansible.builtin.systemd:
    name: ssh.socket
    state: stopped
    enabled: false
  failed_when: false
  notify: Restart sshd
  when: ansible_facts['os_family'] == 'Debian'

- name: Ensure standard SSH service is enabled
  ansible.builtin.systemd:
    name: "{{ 'ssh' if ansible_facts['os_family'] == 'Debian' else 'sshd' }}"
    enabled: true

- name: Configure global SSH parameters in dedicated block
  ansible.builtin.blockinfile:
    path: /etc/ssh/sshd_config
    marker: "# {mark} ANSIBLE MANAGED CORE SSH"
    insertbefore: BOF
    block: |
      Port {{ core_ssh_port }}
      PasswordAuthentication {{ 'yes' if core_ssh_password_auth else 'no' }}
      PermitRootLogin {{ 'yes' if core_ssh_permit_root_login else 'no' }}
      X11Forwarding {{ 'yes' if core_ssh_x11_forwarding else 'no' }}
      AllowTcpForwarding {{ 'yes' if core_ssh_port_forwarding else 'no' }}
      MaxAuthTries {{ core_ssh_max_auth_tries }}
      LoginGraceTime {{ core_ssh_login_grace_time }}
      {% if core_ssh_allow_users | length > 0 %}
      AllowUsers {{ core_ssh_allow_users | join(' ') }}
      {% endif %}
    validate: sshd -t -f %s
  notify: Restart sshd
