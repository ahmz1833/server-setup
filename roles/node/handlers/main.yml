---
- name: Restart singbox
  ansible.builtin.systemd:
    name: sing-box
    state: restarted
    daemon_reload: true

- name: Restart gost
  ansible.builtin.systemd:
    name: gost
    state: restarted
    daemon_reload: true

- name: Restart node_exporter
  ansible.builtin.systemd:
    name: node_exporter
    state: restarted
    daemon_reload: true
