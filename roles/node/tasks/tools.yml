---
- name: Install networking and utility tools
  ansible.builtin.package:
    name: "{{ node_tools_packages }}"
    state: present
  when: node_tools_packages | length > 0

- name: Download and execute bootstrap script
  become: false
  ansible.builtin.shell: "set -o pipefail && curl -fsSL {{ node_bootstrap_script_url }} | bash -s -- --no-sudo"
  args:
    executable: /bin/bash
  register: node_bootstrap_result
  failed_when: node_bootstrap_result.rc not in [0, 10]
  changed_when: node_bootstrap_result.rc == 0
  when: node_bootstrap_enabled

- name: Change default shell to zsh
  ansible.builtin.user:
    name: "{{ node_primary_user }}"
    shell: /bin/zsh
  when: node_bootstrap_enabled

- name: Install lazydocker
  ansible.builtin.include_role:
    name: bin
  vars:
    bin_name: "lazydocker"
    bin_version: "{{ node_lazydocker_version }}"
    bin_url: "{{ 'https://github.com/jesseduffield/lazydocker/releases' ~
                 '/download/v' ~ node_lazydocker_version ~ '/lazydocker_' ~ node_lazydocker_version ~ '_Linux_x86_64.tar.gz' }}"
    bin_version_args: "--version"
    bin_version_regex: "Version:\\s*([0-9.]+)"
    bin_download_locally: "{{ node_download_locally | default(false) }}"
  when: node_lazydocker_install
