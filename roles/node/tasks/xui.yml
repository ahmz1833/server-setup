---
- name: Validate X-UI database configuration
  ansible.builtin.assert:
    that:
      - node_xui_db_type | lower in ['sqlite', 'postgres', 'postgresql', 'pg']
      - (node_xui_db_type | lower == 'sqlite') or (node_xui_db_dsn | length > 0)
    fail_msg: >-
      node_xui_db_type='{{ node_xui_db_type }}' requires node_xui_db_dsn to be set to a
      PostgreSQL DSN (e.g. postgres://user:pass@host:5432/db?sslmode=disable).
    quiet: true

- name: Install x-ui package via remote_asset role
  ansible.builtin.include_role:
    name: ahmz1833.server_setup.asset
  vars:
    asset_name: "x-ui"
    asset_type: "package"
    asset_version: "{{ node_xui_version }}"
    asset_url: "github.com/{{ node_xui_repo }}/releases/download/v%v/x-ui-linux-{{ node_arch_go_platform_suffix }}.tar.gz"
    asset_dest: "/usr/local/x-ui"
    asset_extract: true
    asset_extract_src: "x-ui"
    asset_service_stop: "x-ui"
    asset_download_locally: "{{ node_download_locally | default(false) }}"
    asset_register_path_var: "node_xui_path"

- name: Ensure X-UI log directory exists
  ansible.builtin.file:
    path: /var/log/x-ui
    state: directory
    mode: '0755'

- name: Ensure correct executable permissions for X-UI binaries
  ansible.builtin.file:
    path: "{{ item }}"
    mode: '0755'
  loop:
    - /usr/local/x-ui
    - /usr/local/x-ui/x-ui
    - /usr/local/x-ui/x-ui.sh

- name: Ensure correct executable permissions for Xray binary
  ansible.builtin.shell: "chmod +x /usr/local/x-ui/bin/xray-linux-*"
  args:
    executable: /bin/bash
  changed_when: false

- name: Link x-ui CLI tool to /usr/bin
  ansible.builtin.file:
    src: /usr/local/x-ui/x-ui.sh
    dest: /usr/bin/x-ui
    state: link

# -----------------------------------------------------------------------------
# X-UI Environment File (systemd EnvironmentFile + CLI)
#
# The release ships per-distro unit files whose EnvironmentFile path differs
# (see node_xui_distro_map). Both the running panel AND the `x-ui` CLI read this
# file, so it must be written BEFORE any migrate/setting call for those to
# target the right DB backend.
# -----------------------------------------------------------------------------
- name: Build X-UI environment variable set
  ansible.builtin.set_fact:
    _node_xui_env_all: >-
      {{
        node_xui_env
        | combine({'XUI_DB_TYPE': node_xui_db_type} if node_xui_db_type | lower != 'sqlite' else {})
        | combine({'XUI_DB_DSN': node_xui_db_dsn} if node_xui_db_dsn | length > 0 else {})
        | combine({'XUI_SKIP_HSTS': 'true'} if node_xui_skip_hsts | bool else {})
      }}

- name: Configure X-UI environment file
  ansible.builtin.template:
    src: x-ui.env.j2
    dest: "{{ node_xui_distro.env_file }}"
    mode: '0600'
    owner: root
    group: root
  notify: Restart x-ui
  no_log: true
  when: _node_xui_env_all | length > 0

- name: Remove X-UI environment file when no overrides are set
  ansible.builtin.file:
    path: "{{ node_xui_distro.env_file }}"
    state: absent
  notify: Restart x-ui
  when: _node_xui_env_all | length == 0

- name: Run X-UI database migrations
  ansible.builtin.command: "/usr/local/x-ui/x-ui migrate"
  changed_when: false
  failed_when: false

# -----------------------------------------------------------------------------
# X-UI Settings Management
# -----------------------------------------------------------------------------
- name: Get current X-UI settings
  ansible.builtin.command: /usr/local/x-ui/x-ui setting -show
  register: _node_xui_current_settings
  changed_when: false
  failed_when: false

- name: Parse current X-UI settings
  ansible.builtin.set_fact:
    _node_xui_current_port: "{{ _node_xui_current_settings.stdout | regex_search('port:\\s*(\\d+)', '\\1') | default([], true) | first | default('') }}"
    _node_xui_current_path: "{{ _node_xui_current_settings.stdout | regex_search('webBasePath:\\s*(\\S+)', '\\1') | default([], true) | first | default('') }}"
    _node_xui_current_user: "{{ _node_xui_current_settings.stdout | regex_search('username:\\s*(\\S+)', '\\1') | default([], true) | first | default('') }}"
    _node_xui_current_cert: "{{ _node_xui_current_settings.stdout | regex_search('webCertFile:\\s*(\\S*)', '\\1') | default([], true) | first | default('') }}"
    _node_xui_current_key: "{{ _node_xui_current_settings.stdout | regex_search('webKeyFile:\\s*(\\S*)', '\\1') | default([], true) | first | default('') }}"

- name: Determine if X-UI settings need update
  ansible.builtin.set_fact:
    _node_xui_settings_changed: >-
      {{
        (_node_xui_current_port | string) != (node_xui_port | string)
        or _node_xui_current_path != node_xui_web_base_path
        or _node_xui_current_user != node_xui_username
      }}
    _node_xui_certs_changed: >-
      {{
        _node_xui_current_cert != node_xui_cert_path
        or _node_xui_current_key != node_xui_key_path
      }}

- name: Apply X-UI Panel settings
  ansible.builtin.command: >
    /usr/local/x-ui/x-ui setting
    -username "{{ node_xui_username }}"
    -password "{{ node_xui_password }}"
    -port {{ node_xui_port }}
    -webBasePath "{{ node_xui_web_base_path }}"
  changed_when: _node_xui_settings_changed
  notify: Restart x-ui
  no_log: true
  when: _node_xui_settings_changed

- name: Apply X-UI SSL Certificates
  ansible.builtin.command: >
    /usr/local/x-ui/x-ui cert
    -webCert "{{ node_xui_cert_path }}"
    -webCertKey "{{ node_xui_key_path }}"
  changed_when: true
  notify: Restart x-ui
  when:
    - node_xui_cert_path | length > 0
    - node_xui_key_path | length > 0
    - _node_xui_certs_changed

- name: Retrieve X-UI panel API token
  ansible.builtin.command: /usr/local/x-ui/x-ui setting -getApiToken
  register: _node_xui_api_token_raw
  changed_when: false
  failed_when: false
  no_log: true
  when: node_xui_get_api_token | bool

- name: Register X-UI API token fact
  ansible.builtin.set_fact:
    node_xui_api_token: >-
      {{ _node_xui_api_token_raw.stdout | regex_search('apiToken:\\s*(\\S+)', '\\1') | default([], true) | first | default('') }}
  no_log: true
  when: node_xui_get_api_token | bool

# The release tarball ships per-distro unit files (x-ui.service.debian/.rhel/.arch),
# not a plain x-ui.service; node_xui_distro.service_file selects one by OS family.
- name: Link x-ui systemd service
  ansible.builtin.file:
    src: "{{ node_xui_distro.service_file }}"
    dest: /etc/systemd/system/x-ui.service
    state: link
    force: true
  notify:
    - "systemd daemon-reload"
    - Restart x-ui

- name: Manage x-ui service state
  ansible.builtin.systemd:
    name: x-ui
    state: "{{ node_xui_enabled | ternary('started', 'stopped') }}"
    enabled: "{{ node_xui_enabled }}"
    daemon_reload: true
