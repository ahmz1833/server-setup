---
- name: Install GOST via Binary Install role
  ansible.builtin.include_role:
    name: bin
  vars:
    bin_name: "gost"
    bin_version: "{{ node_gost_version }}"
    bin_url: "{{ 'https://github.com/go-gost/gost/releases' ~
                 '/download/v' ~ node_gost_version ~ '/gost_' ~ node_gost_version ~ '_linux_amd64.tar.gz' }}"
    bin_extract: true
    bin_extract_src: "gost"
    bin_version_args: "-V"
    bin_version_regex: 'gost\s+([0-9.]+)'
    bin_service_stop: "gost"
    bin_download_locally: "{{ node_download_locally | default(false) }}"

- name: Set GOST binary path
  ansible.builtin.set_fact:
    node_gost_bin_path: "{{ _bin_path | default('/usr/local/bin/gost') }}"

- name: Create GOST configuration directory
  ansible.builtin.file:
    path: /etc/gost
    state: directory
    mode: '0755'
    owner: root
    group: root

- name: Generate GOST configuration
  ansible.builtin.copy:
    content: "{{ node_gost_config | to_nice_yaml(indent=2) }}"
    dest: /etc/gost/config.yml
    mode: '0600'
    owner: root
    group: root
  notify: Restart gost
  when: node_gost_config | length > 0

- name: Remove GOST configuration if empty
  ansible.builtin.file:
    path: /etc/gost/config.yaml
    state: absent
  notify: Restart gost
  when: node_gost_config | length == 0

- name: Configure GOST systemd service
  ansible.builtin.template:
    src: gost.service.j2
    dest: /etc/systemd/system/gost.service
    mode: '0644'
  notify: Restart gost

- name: Manage GOST service state
  ansible.builtin.systemd:
    name: gost
    state: "{{ node_gost_enabled | ternary('started', 'stopped') }}"
    enabled: "{{ node_gost_enabled }}"
    daemon_reload: true
